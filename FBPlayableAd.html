<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mary Kay Skin Assessment</title>
<!-- Pixel tracking handled natively by FbPlayableAd.onCTAClick() -->

<style>
  /* 1. STAGE SETUP & FLASH KILL */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #1a0810; overflow: hidden; position: fixed; }
  body { display: flex; align-items: center; justify-content: center; font-family: 'Georgia', serif; }

  .rule, .hero-block, .row-stop, .row-guessing, .row-starttrack, .word-start, .word-tracking, .row-sub, .cta-wrap, .diamond, .letter {
    opacity: 0;
  }

  .card { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

  .bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 70% at 15% 15%, #6b1f35 0%, transparent 55%),
                radial-gradient(ellipse 60% 60% at 85% 85%, rgba(201,169,110,0.15) 0%, transparent 55%),
                linear-gradient(135deg, #1a0810 0%, #3d1020 100%);
    z-index: -1;
  }

  .eyebrow { position: absolute; width: 100%; text-align: center; top: 11%; font-size: clamp(8px, 1.2vw, 11px); letter-spacing: 5px; color: rgba(201,169,110,0.88); opacity: 1; }
  .sig { position: absolute; top: 91%; width: 100%; text-align: center; font-size: clamp(8px, 1vw, 10px); font-style: italic; letter-spacing: 2px; color: rgba(201,169,110,0.4); opacity: 1; }

  .rule { position: absolute; left: 50%; transform: translateX(-50%); height: 1px; background: linear-gradient(90deg, transparent, rgba(201,169,110,0.75), transparent); }
  .rule-top { top: 18%; }
  .rule-mid { top: 50%; }
  .rule-bottom { top: 74%; }
  .diamond { position: absolute; top: calc(50% - 4px); left: 50%; width: 8px; height: 8px; margin-left: -4px; background: #c9a96e; transform: rotate(45deg) scale(0); }

  .hero-block { position: absolute; top: 18%; bottom: 50%; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; opacity: 1; }
  .row-stop { font-size: 18vmin; line-height: 0.9; font-weight: 300; letter-spacing: 4px; color: #fdf6ee; white-space: nowrap; }
  .row-guessing { font-size: 10vmin; font-weight: 300; font-style: italic; letter-spacing: 2px; color: #e8507a; white-space: nowrap; }

  .row-starttrack { position: absolute; width: 100%; text-align: center; top: 58%; font-size: clamp(18px, 4vw, 34px); font-weight: 300; letter-spacing: 4px; white-space: nowrap; opacity: 1; }
  .word-start { color: #e8d5aa; display: inline-block; }
  .word-tracking { font-style: italic; color: #c9a96e; margin-left: 14px; display: inline-block; }

  .row-sub { position: absolute; width: 100%; text-align: center; top: 68%; font-size: clamp(11px, 1.8vw, 15px); font-style: italic; color: rgba(201,169,110,0.92); opacity: 1; }

  .cta-wrap { position: absolute; top: 76%; width: 100%; text-align: center; }
  .cta-link { display: inline-flex; align-items: center; gap: 12px; border: 1px solid rgba(201,169,110,0.65); border-radius: 28px; padding: 12px 30px; text-decoration: none; background: transparent; cursor: pointer; }
  .cta-dot { width: 8px; height: 8px; border-radius: 50%; background: #c9a96e; position: relative; }
  .cta-dot.pulse::after { content: ''; position: absolute; inset: -5px; border-radius: 50%; border: 1px solid #c9a96e; animation: pulse 2s infinite; }

  .rule-top { animation: ruleSlide 0.7s forwards 0.2s; }
  .row-stop { animation: slam 0.4s forwards 0.6s; }
  .row-guessing { animation: slam 0.4s forwards 1.5s; }
  .rule-mid { animation: ruleSlide 0.7s forwards 1.5s; }
  .diamond { animation: diamondPop 0.4s forwards 1.6s; }

  .word-start { animation: slam 0.4s forwards 2.9s; }
  .word-tracking { animation: slam 0.4s forwards 3.3s; }

  .rule-bottom { animation: ruleSlide 0.7s forwards 4.3s; }
  /* cta-wrap animation driven by JS so chime and button stay locked */

  @keyframes slam { 0% { opacity: 0; transform: translateY(-30px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes ruleSlide { from { width: 0; opacity: 0; } to { width: min(320px, 45vw); opacity: 1; } }
  @keyframes diamondPop { to { opacity: 0.8; transform: rotate(45deg) scale(1); } }
  @keyframes letterFade { to { opacity: 1; } }
  @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
</style>
</head>
<body onpointerdown="unlockAudio()" onclick="unlockAudio()">

<div class="card">
  <div class="bg"></div>
  <div class="eyebrow">MARY KAY &nbsp;·&nbsp; SKIN ASSESSMENT</div>
  <div class="rule rule-top"></div><div class="rule rule-mid"></div><div class="rule rule-bottom"></div><div class="diamond"></div>

  <div class="hero-block">
    <div class="row-stop">Stop</div>
    <div class="row-guessing">Guessing.</div>
  </div>

  <div class="row-starttrack">
    <span class="word-start">Start</span><span class="word-tracking">Tracking.</span>
  </div>
  <div class="row-sub" id="row-sub"></div>

  <div class="cta-wrap">
    <a class="cta-link" href="#" onclick="ctaClick(event)">
      <div class="cta-dot" id="cta-dot"></div>
      <div style="color:#e8d5aa; letter-spacing:2px; font-size:10px; text-transform: uppercase;">Get Personalized Solutions Now</div>
    </a>
  </div>
  <div class="sig">Hali Sarah Parsons &nbsp;·&nbsp; Independent Beauty Consultant</div>
</div>

<script>
const SKINCARE_AT = 4200;
const BUTTON_AT   = 6200;

let AC = null;
let unlocked = false;
const pageStart = Date.now();

/* All sounds register here at page load */
const queue = [
    { ms: 600,         fn: () => playBoom() },
    { ms: 1500,        fn: () => playBoom() },
    { ms: 2900,        fn: () => playBoom() },
    { ms: 3300,        fn: () => playBoom() },
    { ms: SKINCARE_AT, fn: () => playPianoRoll() },
    { ms: BUTTON_AT,   fn: () => playChime() },
];

/* First tap anywhere: create AC, resume, fire all queued sounds at correct offsets */
function unlockAudio() {
    if (unlocked) return;
    unlocked = true;
    AC = new (window.AudioContext || window.webkitAudioContext)();
    AC.resume().then(() => {
        const elapsed = Date.now() - pageStart;
        queue.forEach(({ ms, fn }) => {
            setTimeout(fn, Math.max(0, ms - elapsed));
        });
    });
}

function playBoom() {
    const t = AC.currentTime;
    const osc = AC.createOscillator(), g = AC.createGain();
    osc.frequency.setValueAtTime(85, t);
    osc.frequency.exponentialRampToValueAtTime(25, t + 0.4);
    g.gain.setValueAtTime(0.6, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(g); g.connect(AC.destination);
    osc.start(); osc.stop(t + 0.41);
}

function playNote(freq, when, duration, vol) {
    [[1, vol], [2, vol * 0.28], [3, vol * 0.07]].forEach(([mult, gain]) => {
        const o = AC.createOscillator(), g = AC.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(freq * mult, when);
        g.gain.setValueAtTime(0, when);
        g.gain.linearRampToValueAtTime(gain, when + 0.012);
        g.gain.exponentialRampToValueAtTime(0.0001, when + duration);
        o.connect(g); g.connect(AC.destination);
        o.start(when); o.stop(when + duration + 0.05);
    });
}

function playPianoRoll() {
    const freqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25];
    const step = 0.15, dur = 0.85, now = AC.currentTime + 0.02;
    freqs.forEach((f, i) => playNote(f, now + i * step, dur, 0.11));
    const echoStart = now + freqs.length * step + 0.05;
    freqs.slice(-4).forEach((f, i) => playNote(f, echoStart + i * step, dur, 0.04));
}

function playChime() {
    const now = AC.currentTime;
    [[1047, now, 0.20], [1319, now + 0.07, 0.18], [1568, now + 0.14, 0.22]].forEach(([freq, t, vol]) => {
        const o = AC.createOscillator(), g = AC.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 2.2);
        o.connect(g); g.connect(AC.destination);
        o.start(t); o.stop(t + 2.4);
        const o2 = AC.createOscillator(), g2 = AC.createGain();
        o2.type = 'sine';
        o2.frequency.setValueAtTime(freq * 2.0, t);
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(vol * 0.3, t + 0.005);
        g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
        o2.connect(g2); g2.connect(AC.destination);
        o2.start(t); o2.stop(t + 0.8);
    });
}

function ctaClick(e) {
    if (typeof FbPlayableAd !== 'undefined') FbPlayableAd.onCTAClick();
}

/* Subtitle letter-by-letter locked to SKINCARE_AT */
const subEl = document.getElementById('row-sub');
const subText = 'Skincare That Evolves With You';
subEl.innerHTML = subText.split('').map((c, i) =>
  `<span class="letter" style="animation:letterFade 0.3s forwards ${SKINCARE_AT/1000 + i*0.03}s">${c===' '?'&nbsp;':c}</span>`
).join('');

/* Button drop locked to BUTTON_AT */
document.querySelector('.cta-wrap').style.animation = `slam 0.5s forwards ${BUTTON_AT/1000}s`;

/* Pulse dot */
setTimeout(() => document.getElementById('cta-dot').classList.add('pulse'), BUTTON_AT + 50);
</script>
</body>
</html>
